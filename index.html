<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <meta name="viewport" height ="device-height" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="images/favicon.png">
        <link rel= "stylesheet" href='css/main.css'>
        <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@900&display=swap" rel="stylesheet">
        <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
        <style>
            .cursor{
                width: 25px;
                height: 25px;
                position: absolute;
                border: 2px solid rgb(83, 83, 83);
                border-radius: 50%;
                transform: translate(-50%,-50%);
                transition: 50ms;
                transition-timing-function:ease-out ;
                mix-blend-mode: exclusion;
                z-index: 200;
                pointer-events: none;
                transition: 
                    top 50ms linear,
                    left 50ms linear,
                    width 500ms ease,
                    height 500ms ease;
            }
            .cursor2{
                z-index: 200;
                transition: 10ms;
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background-color: black;
                pointer-events: none;
                mix-blend-mode: difference;
                position: absolute;
            }
            .loader-wrapper{
                background-color: white;
                width: 100%;
                height: 100%;
                z-index: 1000;
                position: fixed;
                top: 0;
                left: 0;
                margin: 0px;
                transition: 100ms;
                pointer-events: none;
                display: flex;
                align-items: center;
                transition-timing-function: ease-in;
            }
            
            .innercontent{
                position: relative;
                text-align: left;
                z-index: 1500;
            }
            .innercontent span{
                font-family: Helvetica;
                font-weight: 700;
                font-size: calc(2em + 15vw);
                line-height: .88em;
                z-index: 1500;
            }
            .hi{
                animation: appear 400ms;
                animation-fill-mode: forwards;
                animation-delay: .3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .this{
                animation: appear 400ms;
                animation-fill-mode: forwards;
                animation-delay: 1.3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .pranav{
                animation: appear 400ms; 
                animation-fill-mode: forwards;
                animation-delay: 2.3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            
            @keyframes appear{
                from{
                    opacity: 0;
                }
                to{
                    opacity: 1;
                }
            }
            .pranav2{
                animation: appear 400ms;
                animation-delay: 3.3s;
                animation-fill-mode: forwards;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .innercontent{
                animation: tilt 400ms;
                animation-delay: 4.9s;
                animation-fill-mode: forwards;
                animation-iteration-count: initial;
                transition-duration: 2s;
            }
            @keyframes tilt{
                100%{
                    transform: rotate(9deg);
                }}

            a{
                text-decoration: none;
                cursor:none;
            }

        </style>
        <title>pranav nair</title>
    </head>
    <body>

        <!-- JS Main File-->
        
        <script>
            /* loader control js */
            setTimeout(function(){document.querySelector('.loader-wrapper').style.opacity = "0"; },5300)
        </script>
        
        <script>
            /*kinda laggy cursor control js */
                const cursor = document.querySelector('.cursor');
                document.addEventListener('mousemove', e => {
                    cursor.setAttribute("style", "top: "+e.pageY+"px; left: "+e.pageX+"px;")
                })

                const cursor2 = document.querySelector('.cursor2');
                document.addEventListener('mousemove', e => {
                    cursor2.setAttribute("style", "top: "+e.pageY+"px; left: "+e.pageX+"px;")
                })

                const links = document.querySelectorAll('a')

                links.forEach(link => {
                    link.addEventListener('mouseenter', e => {
                    cursor.classList.add('enlarged')
                })
                link.addEventListener('mouseout', e => {
                    cursor.classList.remove('enlarged')
                })
                })
        </script>
        <script>
            /* js parallax */
            var x = window.innerWidth;
                y = window.innerHeight;
            const full = document.querySelector('.full');
                document.addEventListener('mousemove', e => {
                    full.setAttribute("style", "left: "+(x - e.pageX)/45 +"px;")
                })
        </script>
