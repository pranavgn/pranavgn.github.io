<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <meta name="viewport" height ="device-height" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="images/favicon.png">
        <link rel= "stylesheet" href='css/main.css'>
        <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@900&display=swap" rel="stylesheet">
        <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
        <style>
            .cursor{
                width: 25px;
                height: 25px;
                position: absolute;
                border: 2px solid rgb(41, 41, 41);
                border-radius: 50%;
                transform: translate(-50%,-50%);
                transition: 50ms;
                transition-timing-function: ease-out;
                mix-blend-mode: difference;
                z-index: 100;
                pointer-events: none;
            }
            .loader-wrapper{
                background-color: white;
                width: 100%;
                height: 100%;
                z-index: 1000;
                position: fixed;
                top: 0;
                left: 0;
                margin: 0px;
                transition: 500ms;
                pointer-events: none;
            }
            
            .cursor2{
                z-index: 100;
                transition: 10ms;
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background-color: black;
                pointer-events: none;
                mix-blend-mode: difference;
                position: absolute;
                transition-timing-function: ease-out;
            }
        </style>
        <title>Pranav Nair</title>
    </head>
    <body>
        <!-- LOADER--> 
        <div class="loader-wrapper">
            
        </div>
    
        <!-- PURE CSS INTERACTIVE MARQUEE-->
        <div class="outer">
            <div class="inner">
                <span class="switcher">PRANAV NAIR</span><br>
                <span class="switcher about use"><a>ABOUT</a></span><br>
                <span class="switcher">PRANAV NAIR</span><br>
                <span class="switcher design use"><a>DESIGN</a></span><br>
                <span class="switcher">PRANAV NAIR</span><br>
                <span class="switcher code use"><a>CODE</a></span><br>
                <span class="switcher">PRANAV NAIR</span><br>
                <span class="switcher social use"><a>SOCIAL</a></span><br>
                <span class="switcher">PRANAV NAIR</span><br>
                <span class="switcher book use"><a>BOOK</a></span><br>
                <span class="switcher">PRANAV NAIR</span><br>
                <span class="switcher blog use"><a>BLOG</a></span><br>
                <span>PRANAV NAIR</span><br>
                <span class="about use"><a>ABOUT</a></span><br>
                <span>PRANAV NAIR</span><br>
                <span class="design use"><a>DESIGN</a></span><br>
                <span>PRANAV NAIR</span><br>
                <span class="code use"><a>CODE</a></span><br>

                <span class="social use"><a>SOCIAL</a></span><br>

                <span class="blog use"><a>BLOG</a></span><br>
            </div>    
        </div>
        <!-- outer cursor div-->
        <div class="cursor">
        </div>
        <!-- inner cursor div-->
        <div class="cursor2">
        </div>
        <!-- JS Main File-->
        <script>
            /*kinda laggy cursor control js */
                const cursor = document.querySelector('.cursor');
                document.addEventListener('mousemove', e => {
                    cursor.setAttribute("style", "top: "+e.pageY+"px; left: "+e.pageX+"px;")
                })

                const cursor2 = document.querySelector('.cursor2');
                document.addEventListener('mousemove', e => {
                    cursor2.setAttribute("style", "top: "+e.pageY+"px; left: "+e.pageX+"px;")
                })
        </script>
        <script>
            /* loader control js */
            setTimeout(function(){document.querySelector('.loader-wrapper').style.opacity = "0"},3000)
        </script>
    </body>
</html>
