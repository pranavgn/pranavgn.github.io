<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <meta name="viewport" height ="device-height" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="images/favicon.png">
        <link rel= "stylesheet" href='css/main.css'>
        <script src="js/jquery.min.js"></script>
        <style>
            .cursor{
                width: 25px;
                height: 25px;
                position: absolute;
                border: 2px solid rgb(83, 83, 83);
                border-radius: 50%;
                transform: translate(-50%,-50%);
                transition: 50ms;
                transition-timing-function:ease-out ;
                mix-blend-mode: exclusion;
                z-index: 800;
                pointer-events: none;
                transition: 
                    color 100ms ease,
                    top 50ms linear,
                    left 50ms linear,
                    width 500ms ease,
                    height 500ms ease;
                backface-visibility: hidden;
            }
            .cursor2{
                z-index: 800;
                transition: 10ms;
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background-color: rgb(83, 83, 83);
                pointer-events: none;
                mix-blend-mode: difference;
                position: absolute;
                backface-visibility: hidden;
            }
            .loader-wrapper{
                background-color: white;
                width: 100%;
                height: 100%;
                z-index: 1000;
                position: fixed;
                top: 0;
                left: 0;
                margin: 0px;
                transition: 100ms;
                pointer-events: none;
                display: flex;
                align-items: center;
                transition-timing-function: ease-in;
            }
            
            .innercontent{
                position: relative;
                text-align: left;
                z-index: 1500;
            }
            .innercontent span{
                font-family: Helvetica;
                font-weight: 700;
                font-size: calc(2em + 15vw);
                line-height: .88em;
                z-index: 1500;
            }
            .hi{
                animation: appear 400ms;
                animation-fill-mode: forwards;
                animation-delay: .3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .this{
                animation: appear 400ms;
                animation-fill-mode: forwards;
                animation-delay: 1.3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .pranav{
                animation: appear 400ms; 
                animation-fill-mode: forwards;
                animation-delay: 2.3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            
            @keyframes appear{
                from{
                    opacity: 0;
                }
                to{
                    opacity: 1;
                }
            }
            .pranav2{
                animation: appear 400ms;
                animation-delay: 3.3s;
                animation-fill-mode: forwards;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .innercontent{
                animation: tilt 400ms;
                animation-delay: 4.9s;
                animation-fill-mode: forwards;
                animation-iteration-count: initial;
                transition-duration: 2s;
            }
            @keyframes tilt{
                100%{
                    transform: rotate(9deg);
                }}

            a{
                text-decoration: none;
                cursor:none;
                outline: 0;
            }

            .cursor.enlarged {
                width: 50px;
                height: 50px;
                border-color: rgb(253, 72, 0);
            }
            
            body {
                    overflow: hidden;
                    font-size: 100%;
                    height: 100vh;
                    cursor: none;
                }

            body::selection{
                background: rgb(41, 41, 41);
            }

        </style>
        <title>pranav nair</title>
    </head>
    <body>
        <!-- LOADER--> 
        <div class="loader-wrapper">
            <div class="innercontent">
                <span class="hi">hi,</span><br>
                <span class="this">this</span><br>
                <span class="pranav">is</span><span class="pranav2">pranav</span>
            </div>
        </div>
    
        <!-- MENU ICON-->
        <div class="menu">
            <input type="checkbox" id="check" ></input>
            <label for="check" id="menulabel">&#8801;
            </label>
            <div id="blockbox"></div>
            <div id="textcontainer">
                <p id="menuhead">menu</p>
                <div class="organization">
                    <pre><a class="link navbarcontainer" href="html/about/about.html">about.</a> &nbsp; &nbsp;    <a class="link navbarcontainer" href="html/design/design.html">design.</a>
<a class="link navbarcontainer" href="html/code/code.html">code.</a> &nbsp; &nbsp;     <a class="link navbarcontainer" href="html/social/social.html">social.</a>
<a class="link navbarcontainer" href="html/book/book.html">book.</a> &nbsp; &nbsp;     <a class="link navbarcontainer" href="html/blog/blog.html">blog.</a></pre>
                </div>
            </div>               
        </div>
        <!-- PURE CSS INTERACTIVE MARQUEE-->
        <div class="outer">
            <div class="marquee">
                <span>pranav nair</span><br>
                <span><a class="link use about" href="html/about/about.html">about</a></span><br>
                <span>pranav nair</span><br>
                <span><a class="link use design" href="html/design/design.html">design</a></span><br>
                <span>pranav nair</span><br>
                <span><a class="link use code" href="html/code/code.html">code</a></span><br>
                <span>pranav nair</span><br>
                <span><a class="link use social" href="html/social/social.html">social</a></span><br>
                <span >pranav nair</span><br>
                <span><a class="link use book" href="html/book/book.html">book</a></span><br>
                <span>pranav nair</span><br>
                <span><a class="link use blog" href="html/blog/blog.html">blog</a></span><br>
            </div>    
        </div>
        
        <div class="content-container">
            <div class="content">
                <span>
                    
                </span>
            </div>
        </div>
        <!-- outer cursor div-->
        <div class="cursor">
        </div>
        <!-- inner cursor div-->
        <div class="cursor2">
        </div>
        <!-- JS Main File-->
        
        <script>
            /* loader control js */
            setTimeout(function(){document.querySelector('.loader-wrapper').style.opacity = "0"; },5300)
        </script>
        
        <script>
            /*kinda laggy cursor control js */
                const cursor = document.querySelector('.cursor');
                document.addEventListener('mousemove', e => {
                    cursor.setAttribute("style", "top: "+e.pageY+"px; left: "+e.pageX+"px;")
                })

                const cursor2 = document.querySelector('.cursor2');
                document.addEventListener('mousemove', e => {
                    cursor2.setAttribute("style", "top: "+e.pageY+"px; left: "+e.pageX+"px;")
                })

                const links = document.querySelectorAll('a')

                links.forEach(link => {
                    link.addEventListener('mouseenter', e => {
                    cursor.classList.add('enlarged')
                })
                link.addEventListener('mouseout', e => {
                    cursor.classList.remove('enlarged')
                })
                })
                const labels = document.querySelectorAll('label')
                labels.forEach(label => {
                    label.addEventListener('mouseenter', e => {
                    cursor.classList.add('enlarged')
                    })
                    label.addEventListener('mouseout', e => {
                    cursor.classList.remove('enlarged')
                    })
                })
        setTimeout(uncheck, 4800)
        function uncheck() {
            document.getElementById("check").checked = false;
        }        
        </script>
        <script src="js/jquery.marquee.min.js"></script>
        <script>
            $('.marquee').marquee({
	//duration in milliseconds of the marquee
	duration: 15000,
	//gap in pixels between the tickers
	gap: 0,
	//time in milliseconds before the marquee will start animating
	delayBeforeStart: 0,
	//'left' or 'right'
	direction: 'up',
	//true or false - should the marquee be duplicated to show an effect of continues flow
    duplicated: true,
    startVisible: true,
    pauseOnHover: true
});
        </script>
    </body>
</html>
