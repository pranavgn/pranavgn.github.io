<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <meta name="viewport" height ="device-height" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="images/favicon.png">
        <link rel= "stylesheet" href='css/main.css'>
        <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@900&display=swap" rel="stylesheet">
        <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
        <style>
            .cursor{
                width: 25px;
                height: 25px;
                position: absolute;
                border: 2px solid rgb(41, 41, 41);
                border-radius: 50%;
                transform: translate(-50%,-50%);
                transition: 50ms;
                transition-timing-function:;
                mix-blend-mode: difference;
                z-index: 200;
                pointer-events: none;
            }
            .cursor2{
                z-index: 200;
                transition: 10ms;
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background-color: black;
                pointer-events: none;
                mix-blend-mode: difference;
                position: absolute;
                transition-timing-function:;
            }
            .loader-wrapper{
                background-color: white;
                width: 100%;
                height: 100%;
                z-index: 1000;
                position: fixed;
                top: 0;
                left: 0;
                margin: 0px;
                transition: 400ms;
                pointer-events: none;
                display: flex;
                align-items: center;
                transition-timing-function: ease-in;
            }
            
            .innercontent{
                position: relative;
                text-align: left;
                z-index: 1500;
            }
            .innercontent span{
                font-family: Helvetica;
                font-weight: 700;
                font-size: calc(2em + 15vw);
                line-height: .88em;
                z-index: 1500;
            }
            .hi{
                animation: appear 400ms;
                animation-fill-mode: forwards;
                animation-delay: .3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .this{
                animation: appear 400ms;
                animation-fill-mode: forwards;
                animation-delay: 1.3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .pranav{
                animation: appear 400ms; 
                animation-fill-mode: forwards;
                animation-delay: 2.3s;
                animation-iteration-count: initial;
                opacity: 0;
            }
            
            @keyframes appear{
                from{
                    opacity: 0;
                }
                to{
                    opacity: 1;
                }
            }
            .pranav2{
                animation: appear 400ms;
                animation-delay: 3.3s;
                animation-fill-mode: forwards;
                animation-iteration-count: initial;
                opacity: 0;
            }
            .innercontent{
                animation: tilt 400ms;
                animation-delay: 4.9s;
                animation-fill-mode: forwards;
                animation-iteration-count: initial;
                transition-duration: 2s;
            }
            @keyframes tilt{
                100%{
                    transform: rotate(9deg);
                }}
        </style>
        <title>pranav nair</title>
    </head>
    <body>
        <!-- LOADER--> 
        <div class="loader-wrapper">
            <div class="innercontent">
                <span class="hi">hi,</span><br>
                <span class="this">this</span><br>
                <span class="pranav">is</span><span class="pranav2">pranav</span>
            </div>
        </div>
    
        <!-- MENU ICON-->
        <div class="menu">
            
        </div>

        <!-- PURE CSS INTERACTIVE MARQUEE-->
        <div class="outer">
            <div class="inner">
                <span class="switcher">pranav nair</span><br>
                <span class="switcher about use"><a>about</a></span><br>
                <span class="switcher">pranav nair</span><br>
                <span class="switcher design use"><a>design</a></span><br>
                <span class="switcher">pranav nair</span><br>
                <span class="switcher code use"><a>code</a></span><br>
                <span class="switcher">pranav nair</span><br>
                <span class="switcher social use"><a>social</a></span><br>
                <span class="switcher">pranav nair</span><br>
                <span class="switcher book use"><a>book</a></span><br>
                <span class="switcher">pranav nair</span><br>
                <span class="switcher blog use"><a>blog</a></span><br>
                <span>pranav nair</span><br>
                <span class="about use"><a>about</a></span><br>
                <span>pranav nair</span><br>
                <span class="design use"><a>design</a></span><br>
                <span>pranav nair</span><br>
                <span class="code use"><a>code</a></span><br>
                <span>pranav nair</span><br>
                <span class="social use"><a>social</a></span><br>
                <span >pranav nair</span><br>
                <span class="book use"><a>book</a></span><br>
                <span>pranav nair</span><br>
                <span class="blog use"><a>blog</a></span><br>
            </div>    
        </div>
        
        <div class="content-container">
            <div class="content">
                <span>
                    
                </span>
            </div>
        </div>

        <!-- outer cursor div-->
        <div class="cursor">
        </div>
        <!-- inner cursor div-->
        <div class="cursor2">
        </div>
        <!-- JS Main File-->
        <script>
            /*kinda laggy cursor control js */
                const cursor = document.querySelector('.cursor');
                document.addEventListener('mousemove', e => {
                    cursor.setAttribute("style", "top: "+e.pageY+"px; left: "+e.pageX+"px;")
                })

                const cursor2 = document.querySelector('.cursor2');
                document.addEventListener('mousemove', e => {
                    cursor2.setAttribute("style", "top: "+e.pageY+"px; left: "+e.pageX+"px;")
                })
        </script>
        <script>
            /* loader control js */
            setTimeout(function(){document.querySelector('.loader-wrapper').style.transform = "translateY(-150vh)"},5300)
            
        </script>
    </body>
</html>
